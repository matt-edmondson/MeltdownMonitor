name: iOS Workflow

# Phase 7 of the iOS port (docs/ios-design.md §12). Builds the iOS head on
# a Mac runner, runs the Core + Mobile test suite, uploads the simulator
# `.app`, and — when signing secrets are available and the build is either
# a push to `main` or an `ios-v*` tag — archives an `.ipa` and ships it to
# TestFlight. Tag builds take their marketing version from the tag name;
# untagged `main` builds reuse the most recent `ios-v*` tag's version (the
# monotonic CFBundleVersion from github.run_number still makes each upload
# unique).

on:
  push:
    branches: [main, develop]
    tags: ['ios-v*']
    paths-ignore:
      ["**.md", ".github/ISSUE_TEMPLATE/**", ".github/pull_request_template.md"]
  pull_request:
  workflow_dispatch:

# cancel-in-progress is false so a new push never aborts an in-flight
# TestFlight upload (an interrupted altool run can leave a half-delivered
# build in App Store Connect). PR build-test runs aren't cancelled either —
# a small extra runner cost in exchange for never killing a release upload.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0"
  # Baked into the build via Directory.Build.props when present. Unset (empty)
  # on forks/PRs without the secret, in which case crash reporting stays off.
  MELTDOWN_CRASH_REPORTING_DSN: ${{ secrets.MELTDOWN_CRASH_REPORTING_DSN }}

jobs:
  # Probes whether the repo has the TestFlight signing secrets configured.
  # Outputs `signing_available=yes` only when the maintainer has set the
  # repo-level `IOS_SIGNING_AVAILABLE` flag — contributors without the key
  # get a green "build & test, skip upload" run because the downstream
  # `testflight` job is skipped, not failed.
  #
  # Two non-obvious constraints shape this, both learned the hard way:
  #
  #  1. The probe must read a *repo-level* secret. The actual signing
  #     material (`IOS_CERT_P12_BASE64` et al.) lives in the `ios-release`
  #     environment, and this job does NOT join that environment, so those
  #     secrets are invisible here and would always read empty.
  #
  #  2. The output value must NOT equal the secret value. If we echoed
  #     `available=true` while `IOS_SIGNING_AVAILABLE` is also the literal
  #     `true`, GitHub's secret scrubber drops the whole job output
  #     ("Skip output 'signing_available' since it may contain secret"),
  #     the gate sees an empty string, and the upload is silently skipped.
  #     Emitting `yes`/`no` (never a secret value) keeps the output intact.
  check-secrets:
    name: Check signing secrets
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      signing_available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          IOS_SIGNING_AVAILABLE: ${{ secrets.IOS_SIGNING_AVAILABLE }}
        run: |
          if [ "$IOS_SIGNING_AVAILABLE" = "true" ]; then
            echo "available=yes" >> "$GITHUB_OUTPUT"
            echo "Signing secrets present — TestFlight upload enabled on main pushes and ios-v* tags."
          else
            echo "available=no" >> "$GITHUB_OUTPUT"
            echo "Signing secrets absent — running build & test only (design doc §12 phase 7)."
          fi

  build-test:
    name: Build & test (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # 10.0.2xx feature band. The iOS workload version is NOT taken from the
      # band default (that is 26.0, which builds net10.0-ios26.0 — too old, see
      # below); it is pinned to 26.2 in the install step via a rollback file.
      - name: Setup .NET ${{ env.DOTNET_VERSION }} (10.0.2xx band)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.2xx"

      # The .NET 10 iOS workload requires an EXACT Xcode version match — and the
      # workload's version number is NOT the Xcode version. CI proved it: the
      # pinned workload 26.2.10233 requires Xcode 26.3 (the band default,
      # 26.0.11017, requires 26.0). So we select Xcode 26.3 here.
      #
      # Why pin the 26.2 workload: SkiaSharp 3.119.x — pulled in by Avalonia.Skia
      # 12.0.4 — ships its .NET 10 iOS assembly only as net10.0-ios26.2. The band
      # default (26.0) builds net10.0-ios26.0, so NuGet silently falls back to
      # SkiaSharp's net9.0-ios18.0 build, whose native libSkiaSharp.framework is
      # NOT loaded on device — the app then crashes at launch with
      # `DllNotFoundException: libSkiaSharp`. The 26.2 workload builds
      # net10.0-ios26.2 and resolves SkiaSharp's matching assets + framework.
      # The "Verify native frameworks" step guards against a regression.
      #
      # Select the CANONICAL Xcode_26.3.app, not the Xcode_26.3.0.app symlink the
      # runner also ships: selecting the symlinked Developer dir broke xcrun's
      # macOS-SDK lookup, so actool (the asset-catalog compiler) wasn't found. We
      # resolve to the real path and verify the macOS SDK is present first.
      - name: Select matching Xcode (26.3)
        run: |
          set -e
          PICK=""
          for x in /Applications/Xcode_26.3.app /Applications/Xcode_26.3*.app; do
            [ -e "$x" ] || continue
            REAL=$(readlink -f "$x")
            if [ -d "$REAL/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" ]; then
              PICK="$REAL"; break
            fi
          done
          if [ -z "$PICK" ]; then
            echo "::error title=No complete Xcode 26.3::The pinned iOS workload (26.2.10233) requires Xcode 26.3 with a macOS SDK. Installed Xcodes:"
            ls -d /Applications/Xcode_*.app 2>/dev/null || echo "  (none)"
            exit 1
          fi
          sudo xcode-select -s "$PICK/Contents/Developer"
          echo "Using $(xcodebuild -version | head -n 1) from $PICK"
          echo "macOS SDK: $(xcrun --sdk macosx --show-sdk-path 2>/dev/null || echo '(not found)')"

      # Design doc §14: "fail the build matrix loudly if [the iOS workload
      # is] absent". A silent skip would let the rest of the workflow look
      # green while shipping nothing.
      #
      # Pin the iOS workload to 26.2 via a rollback file rather than the band
      # default (26.0 -> net10.0-ios26.0, too old for SkiaSharp, see the Xcode
      # step) or the manifest latest (26.4/26.5, whose Xcode isn't on the
      # runner). The band in the rollback entry is 10.0.100 because the iOS
      # manifest is published for that band; a 10.0.2xx SDK consumes it via the
      # normal lower-band fallback.
      - name: Install iOS workload 26.2 (fail loudly if unavailable)
        run: |
          set -e
          printf '{ "microsoft.net.sdk.ios": "26.2.10233/10.0.100" }' > /tmp/ios-rollback.json
          if ! dotnet workload install ios --from-rollback-file /tmp/ios-rollback.json; then
            echo "::error title=iOS workload unavailable::dotnet workload install ios (26.2) failed on $(sw_vers -productName) $(sw_vers -productVersion) with $(xcodebuild -version | head -n 1). Phase 7 (docs/ios-design.md §12) requires this workload — see §14 risk mitigation."
            exit 1
          fi
          dotnet workload list
          # Confirm the selected Xcode exposes an iOS SDK >= 26.2 so SkiaSharp's
          # net10.0-ios26.2 assets (and native framework) are used over the
          # net9 fallback that crashes at launch.
          xcodebuild -showsdks | grep -i iphoneos || true

      # Build the Live Activity native targets (Swift) — a dynamic framework
      # carrying the @_cdecl bridge symbols and the SwiftUI widget .appex —
      # straight from the committed XcodeGen spec. The .NET build can't compile
      # Swift, so this is the only place the spec, the Swift, and the
      # framework/.appex link+embed into the app are actually verified (the
      # on-device Lock Screen still needs a real device). Unsigned: DEVELOPMENT_TEAM
      # is unset, so generate.sh builds with CODE_SIGNING_ALLOWED=NO, matching the
      # unsigned .NET builds below. Both SDKs are built so each dotnet build
      # (simulator + device) gets an arch-matched artifact. See docs/live-activity.md.
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build Live Activity native targets (framework + widget .appex)
        run: |
          set -e
          pushd MeltdownMonitor.iOS.WidgetExtension
          SDK=iphonesimulator CONFIG=Release ./generate.sh --build
          SDK=iphoneos        CONFIG=Release ./generate.sh --build
          popd
          echo "Simulator artifacts:"; ls -1 MeltdownMonitor.iOS.WidgetExtension/build/Release-iphonesimulator
          echo "Device artifacts:";    ls -1 MeltdownMonitor.iOS.WidgetExtension/build/Release-iphoneos

      # Restore only the iOS-relevant projects. The solution also contains
      # `MeltdownMonitor.App` and `MeltdownMonitor.Ble.Windows`, both of
      # which target `net10.0-windows*` and refuse to restore on macOS
      # (NETSDK1100). EnableWindowsTargeting wouldn't help — they pull in
      # Windows SDK refs that aren't present on the Mac runner.
      - name: Restore (iOS projects only)
        run: |
          dotnet restore MeltdownMonitor.Core/MeltdownMonitor.Core.csproj
          dotnet restore MeltdownMonitor.Mobile/MeltdownMonitor.Mobile.csproj
          dotnet restore MeltdownMonitor.Ble.Apple/MeltdownMonitor.Ble.Apple.csproj
          dotnet restore MeltdownMonitor.Tests/MeltdownMonitor.Tests.csproj
          dotnet restore MeltdownMonitor.iOS/MeltdownMonitor.iOS.csproj

      - name: Test (Core + Mobile)
        run: |
          dotnet test MeltdownMonitor.Tests/MeltdownMonitor.Tests.csproj \
            -c Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-test-results
          path: TestResults/*.trx
          retention-days: 7

      - name: Build iOS (simulator)
        id: build-sim
        run: |
          set -e
          dotnet build MeltdownMonitor.iOS/MeltdownMonitor.iOS.csproj \
            -c Release \
            -p:RuntimeIdentifier=iossimulator-arm64 \
            -p:BuildIpa=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey= \
            -p:CodesignProvision= \
            -p:MMLiveActivityArtifacts="$GITHUB_WORKSPACE/MeltdownMonitor.iOS.WidgetExtension/build/Release-iphonesimulator"
          APP_PATH=$(find MeltdownMonitor.iOS/bin/Release -type d -name '*.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Simulator .app not produced under MeltdownMonitor.iOS/bin/Release"
            exit 1
          fi
          echo "Simulator bundle: $APP_PATH"
          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Stage simulator bundle
        run: |
          mkdir -p artifacts
          cp -R "${{ steps.build-sim.outputs.app-path }}" artifacts/

      - name: Upload simulator .app bundle
        uses: actions/upload-artifact@v7
        with:
          name: meltdownmonitor-ios-simulator
          path: artifacts/*.app
          retention-days: 7

      # Device build runs unsigned for contributors. It exercises the
      # arm64 toolchain so a missing native dep surfaces in PR CI instead
      # of at release time.
      - name: Build iOS (device, unsigned)
        id: build-device
        run: |
          set -e
          dotnet build MeltdownMonitor.iOS/MeltdownMonitor.iOS.csproj \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:BuildIpa=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey= \
            -p:CodesignProvision= \
            -p:MMLiveActivityArtifacts="$GITHUB_WORKSPACE/MeltdownMonitor.iOS.WidgetExtension/build/Release-iphoneos"
          APP=$(find MeltdownMonitor.iOS/bin/Release -type d -name '*.app' -path '*ios-arm64*' | head -n 1)
          [ -z "$APP" ] && APP=$(find MeltdownMonitor.iOS/bin/Release -type d -name '*.app' | head -n 1)
          echo "device-app=$APP" >> "$GITHUB_OUTPUT"

      # Guards the launch crash this workflow change fixes. SkiaSharp's native
      # libSkiaSharp.framework must be embedded in the device bundle; if it
      # isn't, the app dies at startup with `DllNotFoundException: libSkiaSharp`
      # (the net9.0-ios fallback symptom). A green build alone does NOT catch
      # this — the framework is loaded at runtime, not link time — so assert on
      # the bundle contents here, where CI can actually see them.
      - name: Verify native frameworks embedded (device)
        run: |
          set -e
          APP="${{ steps.build-device.outputs.device-app }}"
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "::error title=Device .app not found::Could not locate the ios-arm64 .app to verify native frameworks."
            exit 1
          fi
          echo "Device bundle: $APP"
          if find "$APP" -name 'libSkiaSharp*' | grep -q .; then
            echo "libSkiaSharp embedded:"; find "$APP" -name 'libSkiaSharp*'
          else
            echo "::error title=libSkiaSharp not embedded::The ios-arm64 .app does not contain libSkiaSharp.framework, so the app would crash at launch with DllNotFoundException: libSkiaSharp. The iOS SDK is likely < 26.2, making NuGet fall back to SkiaSharp's net9.0-ios18.0 build. Confirm Xcode 26.3 was selected (iOS SDK >= 26.2) and SkiaSharp.NativeAssets.iOS is referenced."
            echo "Frameworks dir contents:"; ls -la "$APP/Frameworks" 2>/dev/null || echo "  (no Frameworks dir)"
            exit 1
          fi

      # Confirms the Live Activity native targets actually link + embed into the
      # app (the build/link/embed half of docs/live-activity.md, which the .NET
      # build alone can't exercise). The bridge framework must land in Frameworks/
      # (so its @_cdecl symbols are loaded for dlsym), and the widget extension in
      # PlugIns/ (so iOS can present the activity). On-device rendering still needs
      # a real device.
      - name: Verify Live Activity targets embedded (device)
        run: |
          set -e
          APP="${{ steps.build-device.outputs.device-app }}"
          BRIDGE="$APP/Frameworks/MeltdownLiveActivityBridge.framework"
          APPEX="$APP/PlugIns/MeltdownMonitorWidgetExtension.appex"
          if [ ! -d "$BRIDGE" ]; then
            echo "::error title=Live Activity bridge not embedded::Expected $BRIDGE. The <NativeReference> to MeltdownLiveActivityBridge.framework did not embed — check MMLiveActivityArtifacts and that generate.sh --build produced the device framework."
            echo "Frameworks dir:"; ls -la "$APP/Frameworks" 2>/dev/null || echo "  (none)"
            exit 1
          fi
          if [ ! -d "$APPEX" ]; then
            echo "::error title=Live Activity widget not embedded::Expected $APPEX. AdditionalAppExtensions did not copy the widget .appex into PlugIns/ — check the item metadata and MMLiveActivityArtifacts."
            echo "PlugIns dir:"; ls -la "$APP/PlugIns" 2>/dev/null || echo "  (none)"
            exit 1
          fi
          echo "Live Activity bridge framework + widget .appex embedded:"
          echo "  $BRIDGE"
          echo "  $APPEX"

  testflight:
    name: Archive & upload to TestFlight
    needs: [build-test, check-secrets]
    if: ${{ needs.check-secrets.outputs.signing_available == 'yes' && (startsWith(github.ref, 'refs/tags/ios-v') || github.ref == 'refs/heads/main') }}
    runs-on: macos-latest
    timeout-minutes: 45
    environment: ios-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # 10.0.2xx feature band; the iOS workload is pinned to 26.2 in the install
      # step below (the band default of 26.0 is too old for SkiaSharp — see the
      # build-test job).
      - name: Setup .NET ${{ env.DOTNET_VERSION }} (10.0.2xx band)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.2xx"

      # Match the build-test job exactly (see it for why the pinned 26.2 workload
      # needs Xcode 26.3, and why we select the canonical Xcode_26.3.app rather
      # than the .0 symlink). build-test is the toolchain PR CI actually
      # validates; a mismatch here would only surface on a release tag.
      - name: Select matching Xcode (26.3)
        run: |
          set -e
          PICK=""
          for x in /Applications/Xcode_26.3.app /Applications/Xcode_26.3*.app; do
            [ -e "$x" ] || continue
            REAL=$(readlink -f "$x")
            if [ -d "$REAL/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" ]; then
              PICK="$REAL"; break
            fi
          done
          if [ -z "$PICK" ]; then
            echo "::error title=No complete Xcode 26.3::The pinned iOS workload (26.2.10233) requires Xcode 26.3 with a macOS SDK. Installed Xcodes:"
            ls -d /Applications/Xcode_*.app 2>/dev/null || echo "  (none)"
            exit 1
          fi
          sudo xcode-select -s "$PICK/Contents/Developer"
          echo "Using $(xcodebuild -version | head -n 1) from $PICK"
          echo "macOS SDK: $(xcrun --sdk macosx --show-sdk-path 2>/dev/null || echo '(not found)')"

      - name: Install iOS workload 26.2
        run: |
          set -e
          printf '{ "microsoft.net.sdk.ios": "26.2.10233/10.0.100" }' > /tmp/ios-rollback.json
          if ! dotnet workload install ios --from-rollback-file /tmp/ios-rollback.json; then
            echo "::error title=iOS workload unavailable::dotnet workload install ios (26.2) failed on $(xcodebuild -version | head -n 1)."
            exit 1
          fi

      - name: Import distribution certificate
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_CERT_P12_PASSWORD: ${{ secrets.IOS_CERT_P12_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"

          # Decode the cert into a file WITH a .p12 extension: `security import`
          # infers the format from the extension, so an extension-less temp file
          # fails with "Unknown format in import" no matter what the file
          # actually contains. `tr` strips any whitespace/BOM a copy-paste may
          # have baked in, so a wrapped/padded secret still decodes.
          WORK="$(mktemp -d)"
          CERT="$WORK/dist.p12"
          printf '%s' "$IOS_CERT_P12_BASE64" | tr -d '[:space:]' | base64 --decode > "$CERT"
          if [ ! -s "$CERT" ]; then
            echo "::error title=Empty signing certificate::IOS_CERT_P12_BASE64 decoded to nothing. Set it with e.g. 'base64 -w0 dist.p12 | gh secret set IOS_CERT_P12_BASE64 --env ios-release --repo <owner>/<repo>'."
            exit 1
          fi

          import_cert() {  # $1 = path to a .p12
            security import "$1" -f pkcs12 -k "$KEYCHAIN" -P "$IOS_CERT_P12_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/security
          }

          # `-f pkcs12` is what makes detection work for our temp file. If the
          # import still fails (e.g. macOS can't decrypt the p12's encryption),
          # transcode to a 3DES PKCS#12 with OpenSSL and retry.
          if import_cert "$CERT" 2> /tmp/cert-import.err; then
            echo "Imported signing certificate."
          else
            echo "::warning::Direct import failed ($(cat /tmp/cert-import.err)); transcoding to a 3DES PKCS#12 and retrying."
            # Prefer a real OpenSSL 3 (supports -legacy + 3DES); the runner's
            # default `openssl` may be LibreSSL.
            OPENSSL=openssl
            if command -v brew >/dev/null 2>&1; then
              BREW_SSL="$(brew --prefix openssl@3 2>/dev/null || true)/bin/openssl"
              [ -x "$BREW_SSL" ] && OPENSSL="$BREW_SSL"
            fi
            PEM="$WORK/cert.pem"; LEGACY="$WORK/dist-3des.p12"
            # -legacy loads the legacy provider alongside the default, so this
            # reads both modern AES (default) and old RC2/3DES (legacy) inputs.
            if ! "$OPENSSL" pkcs12 -in "$CERT" -legacy -nodes -passin pass:"$IOS_CERT_P12_PASSWORD" -out "$PEM" 2> /tmp/cert-openssl.err; then
              echo "::error title=Signing certificate unreadable::Could not open the p12 — wrong IOS_CERT_P12_PASSWORD, or it is not a valid PKCS#12. $(cat /tmp/cert-openssl.err)"
              exit 1
            fi
            # Force 3DES for both bags + SHA-1 MAC. 3DES lives in OpenSSL 3's
            # legacy provider, hence -legacy on export too.
            "$OPENSSL" pkcs12 -export -legacy \
              -certpbe PBE-SHA1-3DES -keypbe PBE-SHA1-3DES -macalg sha1 \
              -in "$PEM" -out "$LEGACY" -passout pass:"$IOS_CERT_P12_PASSWORD"
            import_cert "$LEGACY"
            echo "Imported signing certificate after 3DES transcode."
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm -rf "$WORK"

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -e
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > "$PROFILE_DIR/meltdownmonitor-distribution.mobileprovision"

      # --- Live Activity widget (optional, gated on the widget signing assets) ---
      # The Live Activity needs a WidgetKit extension embedded in the app. Shipping
      # a SIGNED one needs its own App ID + App Store distribution provisioning
      # profile (bundle id com.matthewedmondson.meltdownmonitor.WidgetExtension),
      # supplied via the IOS_WIDGET_* secrets below. Until those exist, every step
      # here no-ops and the archive embeds nothing (the .csproj items are
      # Exists()-guarded), so releases ship exactly as before — zero risk.
      # See docs/live-activity.md ▸ "Shipping the widget on TestFlight".
      - name: Install widget provisioning profile (if configured)
        env:
          IOS_WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -e
          if [ -z "$IOS_WIDGET_PROVISIONING_PROFILE_BASE64" ]; then
            echo "No IOS_WIDGET_PROVISIONING_PROFILE_BASE64 — skipping Live Activity widget (app ships without it)."
            exit 0
          fi
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$IOS_WIDGET_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > "$PROFILE_DIR/meltdownmonitor-widget-distribution.mobileprovision"
          echo "Installed widget distribution profile."

      - name: Build Live Activity native targets (signed, if configured)
        env:
          IOS_WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_PROVISIONING_PROFILE_BASE64 }}
          IOS_WIDGET_PROVISION_NAME: ${{ secrets.IOS_WIDGET_PROVISION_NAME }}
          IOS_CODESIGN_KEY: ${{ secrets.IOS_CODESIGN_KEY }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          set -e
          if [ -z "$IOS_WIDGET_PROVISIONING_PROFILE_BASE64" ]; then
            echo "Widget not configured — skipping native build."
            exit 0
          fi
          brew install xcodegen
          pushd MeltdownMonitor.iOS.WidgetExtension
          # Release signing: framework unsigned (the app signs it), .appex
          # distribution-signed with its own profile. MM_APPEX_IDENTITY reuses the
          # app's distribution signing key; MM_APPEX_PROFILE is the widget profile name.
          SDK=iphoneos CONFIG=Release \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            MM_APPEX_IDENTITY="$IOS_CODESIGN_KEY" \
            MM_APPEX_PROFILE="$IOS_WIDGET_PROVISION_NAME" \
            ./generate.sh --build
          popd
          echo "Built signed Live Activity artifacts:"
          ls -1 MeltdownMonitor.iOS.WidgetExtension/build/Release-iphoneos

      # App Store Connect rejects any upload whose CFBundleVersion already
      # exists for a given CFBundleShortVersionString, so the build number must
      # increase on every release. github.run_number is monotonic per workflow,
      # never repeats, and needs no committed bump.
      #
      # The marketing version (CFBundleShortVersionString) is resolved two ways:
      #  - On an ios-v* tag build, it comes from the tag name: e.g.
      #    `ios-v1.1.0` -> 1.1.0.
      #  - On an untagged `main` build, there is no triggering tag, so we reuse
      #    the most recent ios-v* tag reachable from HEAD (git describe). Every
      #    main push then ships under the last released marketing version with a
      #    fresh, monotonic CFBundleVersion — App Store Connect accepts it as a
      #    new build of that version. (Requires the full history + tags fetched
      #    in the checkout step above.)
      #
      # We stamp these straight into Info.plist with PlistBuddy rather than via
      # the -p:ApplicationVersion / -p:ApplicationDisplayVersion MSBuild
      # properties. Those properties only take effect for MAUI single-project
      # apps; this is a plain Microsoft.NET.Sdk iOS head with a hand-authored
      # Info.plist, and for that SDK an explicit Info.plist value WINS over the
      # MSBuild property. Relying on -p: silently shipped CFBundleVersion=1 on
      # every release (App Store Connect error -19232, "bundle version must be
      # higher than the previously uploaded version"). Editing the plist in the
      # ephemeral CI checkout is authoritative and SDK-independent.
      - name: Stamp Info.plist version
        id: version
        run: |
          set -e
          if [[ "$GITHUB_REF" == refs/tags/ios-v* ]]; then
            DISPLAY_VERSION="${GITHUB_REF_NAME#ios-v}"
          else
            # Untagged main build: reuse the most recent ios-v* tag's version.
            LATEST_TAG=$(git describe --tags --abbrev=0 --match 'ios-v*' 2>/dev/null || true)
            if [ -z "$LATEST_TAG" ]; then
              echo "::error title=No ios-v* tag to reuse::This main build has no reachable ios-v* tag for its marketing version. Cut an ios-v* tag once before relying on main-build TestFlight uploads."
              exit 1
            fi
            echo "Reusing marketing version from last tag: $LATEST_TAG"
            DISPLAY_VERSION="${LATEST_TAG#ios-v}"
          fi
          if [ -z "$DISPLAY_VERSION" ]; then
            echo "::error title=Unexpected release ref::Could not resolve a marketing version from ref '$GITHUB_REF_NAME'."
            exit 1
          fi
          BUILD="${{ github.run_number }}"
          PLIST=MeltdownMonitor.iOS/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $DISPLAY_VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PLIST"
          echo "display=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "Stamped $PLIST: marketing version $DISPLAY_VERSION, build $BUILD."
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" -c "Print :CFBundleVersion" "$PLIST"

      - name: Archive .ipa
        env:
          IOS_CODESIGN_KEY: ${{ secrets.IOS_CODESIGN_KEY }}
          IOS_PROVISION_NAME: ${{ secrets.IOS_PROVISION_NAME }}
        run: |
          set -e
          dotnet publish MeltdownMonitor.iOS/MeltdownMonitor.iOS.csproj \
            -c Release \
            -f net10.0-ios \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:BuildIpa=true \
            -p:CodesignKey="$IOS_CODESIGN_KEY" \
            -p:CodesignProvision="$IOS_PROVISION_NAME"

      - name: Locate .ipa
        id: locate-ipa
        run: |
          set -e
          IPA=$(find MeltdownMonitor.iOS/bin -name '*.ipa' | head -n 1)
          if [ -z "$IPA" ]; then
            echo "::error::No .ipa produced under MeltdownMonitor.iOS/bin"
            exit 1
          fi
          echo "Archive: $IPA"
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: meltdownmonitor-ios-ipa
          path: ${{ steps.locate-ipa.outputs.ipa }}
          retention-days: 30

      - name: Upload to TestFlight via App Store Connect API
        env:
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -e
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          # altool's exit code is unreliable — it has returned 0 even when an
          # App Store Connect validation error meant nothing was delivered.
          # Capture its output and fail the step on a non-zero status OR any
          # reported upload error, so a failed upload never reports green.
          set +e
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.locate-ipa.outputs.ipa }}" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" 2>&1 | tee /tmp/altool.log
          STATUS=${PIPESTATUS[0]}
          set -e
          rm -f "$KEY_PATH"
          if [ "$STATUS" -ne 0 ] || grep -qE "UPLOAD FAILED|Failed to upload package" /tmp/altool.log; then
            echo "::error title=TestFlight upload failed::altool did not deliver the build — see the log above for the App Store Connect validation error."
            exit 1
          fi
          echo "Uploaded to TestFlight."
