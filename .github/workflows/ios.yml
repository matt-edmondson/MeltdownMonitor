name: iOS Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'MeltdownMonitor.iOS/**'
      - 'MeltdownMonitor.Mobile/**'
      - 'MeltdownMonitor.Ble.Apple/**'
      - 'MeltdownMonitor.Core/**'
      - 'MeltdownMonitor.Tests/**'
      - 'MeltdownMonitor.sln'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'MeltdownMonitor.iOS/**'
      - 'MeltdownMonitor.Mobile/**'
      - 'MeltdownMonitor.Ble.Apple/**'
      - 'MeltdownMonitor.Core/**'
      - 'MeltdownMonitor.Tests/**'
      - 'MeltdownMonitor.sln'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

# Only build iOS on macOS — Windows / Linux runners can't install the iOS
# workload, so the rest of dotnet.yml stays free of iOS-specific steps.
jobs:
  ios:
    name: Build iOS (Simulator)
    runs-on: macos-14
    timeout-minutes: 30

    permissions:
      contents: read

    env:
      DOTNET_VERSION: "10.0"

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install iOS workload
        run: |
          dotnet workload install ios
          dotnet workload list

      - name: Restore
        run: dotnet restore MeltdownMonitor.iOS/MeltdownMonitor.iOS.csproj

      - name: Build iOS for Simulator
        run: |
          dotnet build MeltdownMonitor.iOS/MeltdownMonitor.iOS.csproj \
            -c Debug \
            -p:RuntimeIdentifier=iossimulator-arm64 \
            --no-restore

      - name: Run Core + Mobile tests
        run: |
          dotnet test MeltdownMonitor.Tests/MeltdownMonitor.Tests.csproj \
            -c Debug \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: TestResults/test-results.trx
