name: iOS Workflow

# Phase 7 of the iOS port (docs/ios-design.md §12). Builds the iOS head on
# a Mac runner, runs the Core + Mobile test suite, uploads the simulator
# `.app`, and — when signing secrets are available and the commit is
# tagged `ios-v*` — archives an `.ipa` and ships it to TestFlight.

on:
  push:
    branches: [main, develop]
    tags: ['ios-v*']
    paths-ignore:
      ["**.md", ".github/ISSUE_TEMPLATE/**", ".github/pull_request_template.md"]
  pull_request:
    paths:
      - 'MeltdownMonitor.iOS/**'
      - 'MeltdownMonitor.Mobile/**'
      - 'MeltdownMonitor.Ble.Apple/**'
      - 'MeltdownMonitor.Core/**'
      - 'MeltdownMonitor.Tests/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0"

jobs:
  # Probes whether the repo has the TestFlight signing secrets configured.
  # Outputs `signing_available=true` only when the maintainer has set
  # `IOS_SIGNING_AVAILABLE=true` as a repo/environment secret — contributors
  # without the key get a green "build & test, skip upload" run because the
  # downstream `testflight` job is skipped, not failed.
  check-secrets:
    name: Check signing secrets
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      signing_available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          IOS_SIGNING_AVAILABLE: ${{ secrets.IOS_SIGNING_AVAILABLE }}
        run: |
          if [ "$IOS_SIGNING_AVAILABLE" = "true" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Signing secrets present — TestFlight upload enabled on ios-v* tags."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets absent — running build & test only (design doc §12 phase 7)."
          fi

  build-test:
    name: Build & test (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # Pin to the 10.0.2xx feature band: its bundled iOS workload (26.3)
      # matches the Xcode 26.3 currently on `macos-latest`. The 10.0.3xx
      # band ships iOS workload 26.5, which the runner image doesn't yet
      # have an Xcode for. Bump this band when the runner picks up
      # Xcode 26.5 or newer.
      - name: Setup .NET ${{ env.DOTNET_VERSION }} (10.0.2xx band)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.2xx"

      # The .NET 10 iOS workload requires an EXACT Xcode version match,
      # not minimum. The 10.0.2xx SDK band ships iOS workload 26.0, which
      # needs Xcode 26.0. Pick the highest 26.0.x Xcode on the runner.
      - name: Select matching Xcode (26.0)
        run: |
          set -e
          CANDIDATES=$(ls -d /Applications/Xcode_26.0*.app 2>/dev/null | sort -V)
          if [ -z "$CANDIDATES" ]; then
            echo "::error title=Xcode 26.0 not on runner::The 10.0.2xx iOS workload requires Xcode 26.0. Available Xcodes on this runner:"
            ls -d /Applications/Xcode_*.app 2>/dev/null || echo "  (none)"
            exit 1
          fi
          XCODE=$(echo "$CANDIDATES" | tail -n 1)
          sudo xcode-select -s "$XCODE/Contents/Developer"
          echo "Using $(xcodebuild -version | head -n 1) from $XCODE"

      # Design doc §14: "fail the build matrix loudly if [the iOS workload
      # is] absent". A silent skip would let the rest of the workflow look
      # green while shipping nothing.
      # `--skip-manifest-update` keeps the iOS manifest bundled with the
      # selected SDK band rather than pulling the latest from NuGet —
      # otherwise even a 10.0.2xx SDK still installs the 26.5 iOS workload
      # (and requires Xcode 26.5).
      - name: Install iOS workload (fail loudly if unavailable)
        run: |
          set -e
          if ! dotnet workload install ios --skip-manifest-update; then
            echo "::error title=iOS workload unavailable::dotnet workload install ios failed on $(sw_vers -productName) $(sw_vers -productVersion) with $(xcodebuild -version | head -n 1). Phase 7 (docs/ios-design.md §12) requires this workload — see §14 risk mitigation."
            exit 1
          fi
          dotnet workload list

      # Restore only the iOS-relevant projects. The solution also contains
      # `MeltdownMonitor.App` and `MeltdownMonitor.Ble.Windows`, both of
      # which target `net10.0-windows*` and refuse to restore on macOS
      # (NETSDK1100). EnableWindowsTargeting wouldn't help — they pull in
      # Windows SDK refs that aren't present on the Mac runner.
      - name: Restore (iOS projects only)
        run: |
          dotnet restore MeltdownMonitor.Core/MeltdownMonitor.Core.csproj
          dotnet restore MeltdownMonitor.Mobile/MeltdownMonitor.Mobile.csproj
          dotnet restore MeltdownMonitor.Ble.Apple/MeltdownMonitor.Ble.Apple.csproj
          dotnet restore MeltdownMonitor.Tests/MeltdownMonitor.Tests.csproj
          dotnet restore MeltdownMonitor.iOS/MeltdownMonitor.iOS.csproj

      - name: Test (Core + Mobile)
        run: |
          dotnet test MeltdownMonitor.Tests/MeltdownMonitor.Tests.csproj \
            -c Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-test-results
          path: TestResults/*.trx
          retention-days: 7

      - name: Build iOS (simulator)
        id: build-sim
        run: |
          set -e
          dotnet build MeltdownMonitor.iOS/MeltdownMonitor.iOS.csproj \
            -c Release \
            -p:RuntimeIdentifier=iossimulator-arm64 \
            -p:BuildIpa=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey= \
            -p:CodesignProvision=
          APP_PATH=$(find MeltdownMonitor.iOS/bin/Release -type d -name '*.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Simulator .app not produced under MeltdownMonitor.iOS/bin/Release"
            exit 1
          fi
          echo "Simulator bundle: $APP_PATH"
          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Stage simulator bundle
        run: |
          mkdir -p artifacts
          cp -R "${{ steps.build-sim.outputs.app-path }}" artifacts/

      - name: Upload simulator .app bundle
        uses: actions/upload-artifact@v7
        with:
          name: meltdownmonitor-ios-simulator
          path: artifacts/*.app
          retention-days: 7

      # Device build runs unsigned for contributors. It exercises the
      # arm64 toolchain so a missing native dep surfaces in PR CI instead
      # of at release time.
      - name: Build iOS (device, unsigned)
        run: |
          dotnet build MeltdownMonitor.iOS/MeltdownMonitor.iOS.csproj \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:BuildIpa=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey= \
            -p:CodesignProvision=

  testflight:
    name: Archive & upload to TestFlight
    needs: [build-test, check-secrets]
    if: ${{ needs.check-secrets.outputs.signing_available == 'true' && startsWith(github.ref, 'refs/tags/ios-v') }}
    runs-on: macos-latest
    timeout-minutes: 45
    environment: ios-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # Pin to the 10.0.2xx feature band: its bundled iOS workload (26.3)
      # matches the Xcode 26.3 currently on `macos-latest`. The 10.0.3xx
      # band ships iOS workload 26.5, which the runner image doesn't yet
      # have an Xcode for. Bump this band when the runner picks up
      # Xcode 26.5 or newer.
      - name: Setup .NET ${{ env.DOTNET_VERSION }} (10.0.2xx band)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.2xx"

      # Match the build-test job exactly. The 10.0.2xx iOS workload requires an
      # EXACT Xcode match (26.0), and build-test is the toolchain PR CI actually
      # validates. Selecting "latest" here risked a workload/Xcode mismatch that
      # only ever surfaced on a release tag — long after a contributor could
      # catch it.
      - name: Select matching Xcode (26.0)
        run: |
          set -e
          CANDIDATES=$(ls -d /Applications/Xcode_26.0*.app 2>/dev/null | sort -V)
          if [ -z "$CANDIDATES" ]; then
            echo "::error title=Xcode 26.0 not on runner::The 10.0.2xx iOS workload requires Xcode 26.0. Available Xcodes on this runner:"
            ls -d /Applications/Xcode_*.app 2>/dev/null || echo "  (none)"
            exit 1
          fi
          XCODE=$(echo "$CANDIDATES" | tail -n 1)
          sudo xcode-select -s "$XCODE/Contents/Developer"
          echo "Using $(xcodebuild -version | head -n 1) from $XCODE"

      - name: Install iOS workload
        run: |
          set -e
          if ! dotnet workload install ios --skip-manifest-update; then
            echo "::error title=iOS workload unavailable::dotnet workload install ios failed on $(xcodebuild -version | head -n 1)."
            exit 1
          fi

      - name: Import distribution certificate
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_CERT_P12_PASSWORD: ${{ secrets.IOS_CERT_P12_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -e
          KEYCHAIN=build.keychain
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          CERT=$(mktemp)
          echo "$IOS_CERT_P12_BASE64" | base64 --decode > "$CERT"
          security import "$CERT" -k "$KEYCHAIN" -P "$IOS_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm -f "$CERT"

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -e
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > "$PROFILE_DIR/meltdownmonitor-distribution.mobileprovision"

      - name: Archive .ipa
        env:
          IOS_CODESIGN_KEY: ${{ secrets.IOS_CODESIGN_KEY }}
          IOS_PROVISION_NAME: ${{ secrets.IOS_PROVISION_NAME }}
        run: |
          set -e
          dotnet publish MeltdownMonitor.iOS/MeltdownMonitor.iOS.csproj \
            -c Release \
            -f net10.0-ios \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:BuildIpa=true \
            -p:CodesignKey="$IOS_CODESIGN_KEY" \
            -p:CodesignProvision="$IOS_PROVISION_NAME"

      - name: Locate .ipa
        id: locate-ipa
        run: |
          set -e
          IPA=$(find MeltdownMonitor.iOS/bin -name '*.ipa' | head -n 1)
          if [ -z "$IPA" ]; then
            echo "::error::No .ipa produced under MeltdownMonitor.iOS/bin"
            exit 1
          fi
          echo "Archive: $IPA"
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: meltdownmonitor-ios-ipa
          path: ${{ steps.locate-ipa.outputs.ipa }}
          retention-days: 30

      - name: Upload to TestFlight via App Store Connect API
        env:
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -e
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.locate-ipa.outputs.ipa }}" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
          rm -f "$KEY_PATH"
