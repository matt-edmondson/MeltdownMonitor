name: Android Workflow

# Phase 7 of the Android port (docs/android-design.md §10 / §13). Builds the
# Android head and the Ble.Android library on a plain ubuntu-latest runner — no
# Mac required, unlike the iOS workflow — runs the Core + Mobile test suite, and
# uploads the app bundle. When signing secrets are available and the commit is
# tagged `android-v*`, it produces a signed `.aab` for the Play internal-testing
# track.

on:
  push:
    branches: [main, develop]
    tags: ['android-v*']
    paths-ignore:
      ["**.md", ".github/ISSUE_TEMPLATE/**", ".github/pull_request_template.md"]
  pull_request:
    paths:
      - 'MeltdownMonitor.Android/**'
      - 'MeltdownMonitor.Ble.Android/**'
      - 'MeltdownMonitor.Mobile/**'
      - 'MeltdownMonitor.Core/**'
      - 'MeltdownMonitor.Tests/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0"
  # Baked into the build via Directory.Build.props when present. Unset (empty)
  # on forks/PRs without the secret, in which case crash reporting stays off.
  MELTDOWN_CRASH_REPORTING_DSN: ${{ secrets.MELTDOWN_CRASH_REPORTING_DSN }}

jobs:
  # Mirrors the iOS workflow's probe: outputs `signing_available=yes` only when
  # the maintainer set the repo-level ANDROID_SIGNING_AVAILABLE flag, so forks
  # and contributors without the key still get a green build-and-test run. The
  # output value is never the secret value, so GitHub's scrubber leaves it intact.
  check-secrets:
    name: Check signing secrets
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      signing_available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          ANDROID_SIGNING_AVAILABLE: ${{ secrets.ANDROID_SIGNING_AVAILABLE }}
        run: |
          if [ "$ANDROID_SIGNING_AVAILABLE" = "true" ]; then
            echo "available=yes" >> "$GITHUB_OUTPUT"
            echo "Signing secrets present — signed .aab enabled on android-v* tags."
          else
            echo "available=no" >> "$GITHUB_OUTPUT"
            echo "Signing secrets absent — running build & test only."
          fi

  build-test:
    name: Build & test (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "zulu"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}.x

      # Pin the android workload to the binding the head was developed and
      # compiled against (Microsoft.Android 36.1.53). Without the pin, the band
      # default can resolve a newer binding whose Android API surface has renamed
      # types (e.g. the BLE transport enum), breaking the C# compile. Fail loudly
      # if it can't install — a silent skip would let the rest of the workflow
      # look green while shipping nothing (mirrors ios.yml's §14 posture).
      - name: Install android workload 36.1.53 (fail loudly if unavailable)
        run: |
          set -e
          printf '{ "microsoft.net.sdk.android": "36.1.53/10.0.100" }' > /tmp/android-rollback.json
          if ! dotnet workload install android --from-rollback-file /tmp/android-rollback.json; then
            echo "::error title=android workload unavailable::dotnet workload install android (36.1.53) failed. Phase 7 (docs/android-design.md §10) requires this workload."
            exit 1
          fi
          dotnet workload list

      # The Core + Mobile suite is platform-neutral and runs anywhere — no Android
      # SDK or workload needed for it (CLAUDE.md build matrix).
      - name: Test (Core + Mobile)
        run: |
          dotnet test MeltdownMonitor.Tests/MeltdownMonitor.Tests.csproj \
            -c Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-results
          path: TestResults/*.trx
          retention-days: 7

      # The ubuntu-latest image ships an Android SDK; ensure the API level the head
      # targets (and build-tools) is present and licensed. Pulls from Google's
      # repository, which is reachable on GitHub-hosted runners.
      - name: Ensure Android SDK dependencies
        run: |
          set -e
          dotnet build MeltdownMonitor.Android/MeltdownMonitor.Android.csproj \
            -t:InstallAndroidDependencies \
            -f net10.0-android \
            -p:AcceptAndroidSdkLicenses=true

      - name: Build Ble.Android library
        run: dotnet build MeltdownMonitor.Ble.Android/MeltdownMonitor.Ble.Android.csproj -c Release

      - name: Build Android head (unsigned .aab)
        run: |
          set -e
          dotnet publish MeltdownMonitor.Android/MeltdownMonitor.Android.csproj \
            -c Release \
            -f net10.0-android \
            -p:AndroidPackageFormat=aab
          AAB=$(find MeltdownMonitor.Android/bin -name '*-Signed.aab' -o -name '*.aab' | head -n 1)
          if [ -z "$AAB" ]; then
            echo "::error::No .aab produced under MeltdownMonitor.Android/bin"
            exit 1
          fi
          echo "Bundle: $AAB"
          echo "AAB_PATH=$AAB" >> "$GITHUB_ENV"

      - name: Upload app bundle
        uses: actions/upload-artifact@v7
        with:
          name: meltdownmonitor-android-aab
          path: ${{ env.AAB_PATH }}
          retention-days: 14

  release:
    name: Signed .aab (Play internal testing)
    needs: [build-test, check-secrets]
    if: ${{ needs.check-secrets.outputs.signing_available == 'yes' && startsWith(github.ref, 'refs/tags/android-v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: android-release
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "zulu"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}.x

      - name: Install android workload 36.1.53
        run: |
          set -e
          printf '{ "microsoft.net.sdk.android": "36.1.53/10.0.100" }' > /tmp/android-rollback.json
          dotnet workload install android --from-rollback-file /tmp/android-rollback.json

      - name: Ensure Android SDK dependencies
        run: |
          dotnet build MeltdownMonitor.Android/MeltdownMonitor.Android.csproj \
            -t:InstallAndroidDependencies -f net10.0-android -p:AcceptAndroidSdkLicenses=true

      # Decode the upload keystore from a base64 secret into a temp file.
      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -e
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.keystore"

      # Marketing version comes from the android-v* tag; the version code is the
      # monotonic run number so every uploaded build increases (Play rejects a
      # repeated versionCode), mirroring the iOS CFBundleVersion stamping.
      - name: Build signed .aab
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          DISPLAY_VERSION="${GITHUB_REF_NAME#android-v}"
          dotnet publish MeltdownMonitor.Android/MeltdownMonitor.Android.csproj \
            -c Release \
            -f net10.0-android \
            -p:AndroidPackageFormat=aab \
            -p:ApplicationDisplayVersion="$DISPLAY_VERSION" \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="$RUNNER_TEMP/upload.keystore" \
            -p:AndroidSigningKeyAlias="$ANDROID_KEY_ALIAS" \
            -p:AndroidSigningStorePass="$ANDROID_KEYSTORE_PASSWORD" \
            -p:AndroidSigningKeyPass="$ANDROID_KEY_PASSWORD"
          AAB=$(find MeltdownMonitor.Android/bin -name '*-Signed.aab' | head -n 1)
          [ -z "$AAB" ] && AAB=$(find MeltdownMonitor.Android/bin -name '*.aab' | head -n 1)
          echo "AAB_PATH=$AAB" >> "$GITHUB_ENV"

      - name: Upload signed bundle
        uses: actions/upload-artifact@v7
        with:
          name: meltdownmonitor-android-aab-signed
          path: ${{ env.AAB_PATH }}
          retention-days: 30
