<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" role="img" aria-label="MeltdownMonitor Regulation Field — signature visualization">
  <title>MeltdownMonitor — Regulation Field (signature visualization, representative frame)</title>
  <!--
    Representative still of the live instrument. Frame shown: drifting from Watching toward Warning.
    Encodings: marker position = autonomic balance | stroke = HRV amount (jitter overlay) |
    lobe width = lobe balance | ghost = EWMA baseline (locked) | comet trail = trajectory |
    color = detector state | bottom row = monospace numerics.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#24273a"/><stop offset="1" stop-color="#1e2030"/>
    </linearGradient>
    <linearGradient id="cool" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dc4e4"/><stop offset="1" stop-color="#91d7e3"/>
    </linearGradient>
    <linearGradient id="warm" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5a97f"/><stop offset="1" stop-color="#ee99a0"/>
    </linearGradient>
    <radialGradient id="marker" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5a97f"/><stop offset="0.5" stop-color="#f5a97f"/>
      <stop offset="1" stop-color="#f5a97f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cad3f5"/><stop offset="0.45" stop-color="#b7bdf8"/>
      <stop offset="1" stop-color="#b7bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="320" height="280" rx="18" fill="url(#bg)"/>

  <!-- header -->
  <text x="18" y="28" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,monospace" font-size="11" letter-spacing="2" fill="#8087a2">REGULATION FIELD</text>
  <!-- baseline-locked indicator (EWMA frozen during Warning/Alerting) -->
  <text x="276" y="25" text-anchor="end" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" letter-spacing="1" fill="#6e738d">BASELINE LOCKED</text>
  <g stroke="#8087a2" stroke-width="1.4" fill="none">
    <rect x="284" y="22" width="12" height="9" rx="1.5" fill="#8087a2" stroke="none"/>
    <path d="M286.4 22 v-2.6 a3.6 3.6 0 0 1 7.2 0 V22"/>
  </g>

  <!-- window of tolerance zone -->
  <ellipse cx="160" cy="120" rx="40" ry="30" fill="#b7bdf8" opacity="0.08"/>
  <ellipse cx="160" cy="120" rx="40" ry="30" fill="none" stroke="#b7bdf8" stroke-width="1" stroke-dasharray="2 5" opacity="0.5"/>
  <text x="160" y="62" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="8" letter-spacing="1.5" fill="#b7bdf8" opacity="0.85">WINDOW OF TOLERANCE</text>

  <!-- ghost baseline lemniscate (regulated-you reference) -->
  <g fill="none" stroke="#8087a2" stroke-linecap="round" stroke-linejoin="round" stroke-width="12" opacity="0.28">
    <path d="M160 120 C148 78 92 78 76 120 C92 162 148 162 160 120 Z"/>
    <path d="M160 120 C172 78 228 78 244 120 C228 162 172 162 160 120 Z"/>
  </g>

  <!-- live lemniscate: cool lobe thinning, warm lobe swelling -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M160 120 C148 78 92 78 76 120 C92 162 148 162 160 120 Z" stroke="url(#cool)" stroke-width="10.5"/>
    <path d="M160 120 C172 78 228 78 244 120 C228 162 172 162 160 120 Z" stroke="url(#warm)" stroke-width="15"/>
  </g>
  <!-- variability jitter overlay (sampled-signal texture) -->
  <g fill="none" stroke="#cad3f5" stroke-linecap="round" stroke-width="1.4" stroke-dasharray="1 6" opacity="0.45">
    <path d="M160 120 C148 78 92 78 76 120 C92 162 148 162 160 120 Z"/>
    <path d="M160 120 C172 78 228 78 244 120 C228 162 172 162 160 120 Z"/>
  </g>

  <!-- comet trail (recent trajectory toward the warm pole) -->
  <circle cx="168" cy="116" r="2.4" fill="#f5a97f" opacity="0.30"/>
  <circle cx="180" cy="110" r="3.0" fill="#f5a97f" opacity="0.45"/>
  <circle cx="193" cy="103" r="3.7" fill="#f5a97f" opacity="0.65"/>

  <!-- live marker (current autonomic balance = drifting into sympathetic lobe) -->
  <circle cx="208" cy="96" r="16" fill="url(#marker)"/>
  <circle cx="208" cy="96" r="6.5" fill="#f5a97f"/>
  <circle cx="208" cy="96" r="2.6" fill="#24273a"/>

  <!-- crossover node -->
  <circle cx="160" cy="120" r="18" fill="url(#node)"/>
  <circle cx="160" cy="120" r="7" fill="#b7bdf8"/>
  <circle cx="160" cy="120" r="3" fill="#cad3f5"/>

  <!-- pole labels -->
  <text x="14" y="118" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="9" letter-spacing="1" fill="#7dc4e4">SHUTDOWN</text>
  <text x="14" y="130" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="7" fill="#6e738d">freeze / low arousal</text>
  <text x="306" y="118" text-anchor="end" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="9" letter-spacing="1" fill="#f5a97f">MELTDOWN</text>
  <text x="306" y="130" text-anchor="end" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="7" fill="#6e738d">fight / high arousal</text>

  <!-- live numeric readout (monospace) -->
  <line x1="18" y1="238" x2="302" y2="238" stroke="#363a4f" stroke-width="1"/>
  <text x="18" y="260" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,monospace" font-size="13" fill="#a5adcb">
    <tspan fill="#cad3f5">HR</tspan> 78<tspan dx="14" fill="#cad3f5">RMSSD</tspan> 31<tspan font-size="9" fill="#6e738d">ms</tspan><tspan dx="14" fill="#cad3f5">LF/HF</tspan> 1.8
  </text>
  <text x="302" y="260" text-anchor="end" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="11" letter-spacing="1" fill="#f5a97f">&#9656; WARNING</text>
</svg>
