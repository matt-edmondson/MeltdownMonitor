<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Annotation — Overwhelmed">
  <title>Annotation — Overwhelmed</title>
  <!-- Overwhelmed: warm-dominant, cool lobe collapsed. -->
  <defs>
    <linearGradient id="cool" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dc4e4"/><stop offset="1" stop-color="#91d7e3"/>
    </linearGradient>
    <linearGradient id="warm" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5a97f"/><stop offset="1" stop-color="#ee99a0"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M128 128 C116 86 60 86 44 128 C60 170 116 170 128 128 Z" stroke="url(#cool)" stroke-width="7" opacity="0.55"/>
    <path d="M128 128 C140 86 196 86 212 128 C196 170 140 170 128 128 Z" stroke="url(#warm)" stroke-width="21"/>
  </g>
  <circle cx="128" cy="128" r="8.5" fill="#b7bdf8"/>
  <circle cx="128" cy="128" r="3.5" fill="#cad3f5"/>
</svg>
