    <path d="M16 16 C17.5 10.75 24.5 10.75 26.5 16 C24.5 21.25 17.5 21.25 16 16 Z" stroke-width="4.6"/>
  </g>
  <circle cx="16" cy="16" r="2" fill="#b7bdf8"/>
</svg>
