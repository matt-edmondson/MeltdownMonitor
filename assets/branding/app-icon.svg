<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="MeltdownMonitor app icon">
  <title>MeltdownMonitor — App Icon</title>
  <!-- Full-detail resting frame on a Macchiato rounded-square field with a soft Lavender crossover glow. -->
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#24273a"/>
      <stop offset="1" stop-color="#1e2030"/>
    </linearGradient>
    <linearGradient id="cool" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dc4e4"/>
      <stop offset="1" stop-color="#91d7e3"/>
    </linearGradient>
    <linearGradient id="warm" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5a97f"/>
      <stop offset="1" stop-color="#ee99a0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#b7bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#b7bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cad3f5"/>
      <stop offset="0.45" stop-color="#b7bdf8"/>
      <stop offset="1" stop-color="#b7bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#field)"/>
  <rect x="8.5" y="8.5" width="239" height="239" rx="53.5" fill="none" stroke="#363a4f" stroke-width="1"/>
  <circle cx="128" cy="128" r="92" fill="url(#glow)"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="15">
    <path d="M128 128 C116 86 60 86 44 128 C60 170 116 170 128 128 Z" stroke="url(#cool)"/>
    <path d="M128 128 C140 86 196 86 212 128 C196 170 140 170 128 128 Z" stroke="url(#warm)"/>
  </g>
  <circle cx="128" cy="128" r="24" fill="url(#node)"/>
  <circle cx="128" cy="128" r="8.5" fill="#b7bdf8"/>
  <circle cx="128" cy="128" r="3.5" fill="#cad3f5"/>
</svg>
