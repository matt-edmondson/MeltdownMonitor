    <path d="M128 128 C116 86 60 86 44 128 C60 170 116 170 128 128 Z"/>
    <path d="M128 128 C140 86 196 86 212 128 C196 170 140 170 128 128 Z"/>
  </g>
  <circle cx="128" cy="128" r="9" fill="#cad3f5"/>
</svg>
