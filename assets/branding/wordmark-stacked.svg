<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 330" role="img" aria-label="MeltdownMonitor stacked lockup">
  <title>MeltdownMonitor — Stacked Lockup</title>
  <defs>
    <linearGradient id="cool" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dc4e4"/><stop offset="1" stop-color="#91d7e3"/>
    </linearGradient>
    <linearGradient id="warm" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5a97f"/><stop offset="1" stop-color="#ee99a0"/>
    </linearGradient>
    <radialGradient id="node" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cad3f5"/><stop offset="0.45" stop-color="#b7bdf8"/>
      <stop offset="1" stop-color="#b7bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(77.6,8) scale(0.8)">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="15">
      <path d="M128 128 C116 86 60 86 44 128 C60 170 116 170 128 128 Z" stroke="url(#cool)"/>
      <path d="M128 128 C140 86 196 86 212 128 C196 170 140 170 128 128 Z" stroke="url(#warm)"/>
    </g>
    <circle cx="128" cy="128" r="22" fill="url(#node)"/>
    <circle cx="128" cy="128" r="8.5" fill="#b7bdf8"/>
    <circle cx="128" cy="128" r="3.5" fill="#cad3f5"/>
  </g>
  <text x="180" y="282" text-anchor="middle" font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="50" font-weight="600" letter-spacing="-1">
    <tspan fill="#cad3f5">Meltdown</tspan><tspan fill="#b8c0e0" font-weight="400">Monitor</tspan>
  </text>
